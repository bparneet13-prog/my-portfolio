<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Parneet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #4a90e2;
            color: white;
        }

        nav {
            text-align: center;
            background-color: #333;
            padding: 12px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 16px;
        }

        nav a:hover {
            color: #4a90e2;
        }

        .container {
            display: flex;
            padding: 40px;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .container img {
            width: 250px;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container img:hover {
            transform: scale(1.1);
        }

        .text {
            max-width: 400px;
            text-align: center;
        }

        button {
            background-color: #4a90e2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #357abd;
            transform: scale(1.05);
        }

        .skills {
            text-align: center;
            padding: 30px;
        }

        .skill-box {
            display: inline-block;
            background: #4a90e2;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .skill-box:hover {
            background: #357abd;
            transform: scale(1.1);
        }

        /* Contact Form */
        .contact {
            text-align: center;
            padding: 30px;
        }

        .contact input, .contact textarea {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .contact button {
            background-color: #4a90e2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact button:hover {
            background-color: #357abd;
            transform: scale(1.05);
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .container img {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#contact-section">Contact</a>
    </nav>

    <header>
        <h1>Welcome to My Website 👋</h1>
        <p>I am Parneet - Future Web Developer</p>
    </header>

    <div class="container">
        <img src="myphoto.jpg" alt="Parneet Photo">
        <div class="text">
            <h2>About Me</h2>
            <p>I am learning web development and building my future in IT.</p>
            <input type="text" id="username" placeholder="Enter your name">
            <button onclick="showMessage()">Contact Me</button>
        </div>
    </div>

    <div class="skills">
        <h2>My Skills</h2>
        <div class="skill-box">HTML</div>
        <div class="skill-box">CSS</div>
        <div class="skill-box">JavaScript</div>
        <div class="skill-box">React</div>
    </div>

    <div class="contact" id="contact-section">
        <h2>Contact Me</h2>
        <form action=":https://formspree.io/f/mojpaprw" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>2026 Parneet | Future Web Developer</p>
    </footer>

    <script>
        function showMessage() {
            let nameInput = document.getElementById("username").value;
            if(nameInput === "") {
                alert("Please enter your name 😅");
            } else {
                alert("Hello " + nameInput + " 💖 Thanks for visiting my website!");
            }
        }
    </script>

</body>
</html>
